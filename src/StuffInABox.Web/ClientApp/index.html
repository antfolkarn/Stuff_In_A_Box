    <script>(function(){try{var t=localStorage.getItem("sib_theme");if(t!=="light"&&t!=="dark"){t=window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light"}document.documentElement.setAttribute("data-theme",t);var d=localStorage.getItem("sib_design")||"standard";document.documentElement.setAttribute("data-design",d)}catch(e){}})();</script>
