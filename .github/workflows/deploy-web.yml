name: Deploy web app

# Builds + deploys the CONSUMER app (StuffInABox.Web, API + SPA) to its App Service.
# Triggers on changes to the web host or any shared project it depends on. Infra is a
# separate pipeline (infra.yml); this one assumes the App Service already exists.

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'src/StuffInABox.Web/**'
      - 'src/StuffInABox.Domain/**'
      - 'src/StuffInABox.Application/**'
      - 'src/StuffInABox.Infrastructure/**'
      - '.github/workflows/deploy-web.yml'

permissions:
  id-token: write # required for OIDC login
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency: deploy-web
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # --- Build the client, then publish the .NET app (the SPA goes into wwwroot first) ---
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/StuffInABox.Web/ClientApp/package-lock.json

      - name: Build SPA
        working-directory: src/StuffInABox.Web/ClientApp
        run: |
          npm ci
          npm run build

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish app
        # -r linux-x64 keeps only the Linux native assets (SkiaSharp/SQLite) instead of every
        # platform's — a ~30 MB artifact instead of ~490 MB.
        run: dotnet publish src/StuffInABox.Web -c Release -r linux-x64 --no-self-contained -o publish

      - name: Deploy app to App Service
        # A pre-built zip skips the Oryx build that hangs OneDeploy on the Free (F1) tier.
        # zipfile (Python, always present in the azure-cli image) writes forward-slash paths
        # that Kudu can rsync without breakage.
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            python3 -c "import shutil; shutil.make_archive('app', 'zip', 'publish')"
            # On F1 the CLI's async status poll can time out and exit non-zero even when the
            # deploy lands. Don't fail here on that — the next step verifies the commit is
            # actually live and fails the job if it isn't (so real failures still go red).
            az webapp deploy \
              --resource-group "rg-stuffinabox-${{ vars.AZURE_ENV }}" \
              --name "${{ vars.AZURE_APP_NAME }}" \
              --src-path app.zip --type zip || echo "az deploy exited non-zero — verifying liveness next"

      - name: Verify the new commit is live
        # /version returns the commit baked in at build (SourceRevisionId). Poll until it
        # matches the pushed SHA, so the job's status reflects what's actually serving.
        run: |
          expected="${{ github.sha }}"
          url="https://${{ vars.AZURE_APP_NAME }}.azurewebsites.net/version"
          echo "Waiting for $url to report $expected"
          for i in $(seq 1 40); do
            body=$(curl -s -m 20 "$url" || true)
            echo "attempt $i: $body"
            case "$body" in *"$expected"*) echo "Verified live."; exit 0 ;; esac
            sleep 15
          done
          echo "Timed out — new commit not live."; exit 1
