name: Deploy to Azure

# Deploys the Bicep infrastructure and then the app code to Azure App Service.
# Auth uses GitHub OIDC federated credentials (no stored Azure password) — see
# infra/github-oidc-setup.md to create the Entra app, trust + role assignment, and to
# set the required GitHub secrets/variables.

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - 'src/**'
      - '.github/workflows/deploy.yml'

permissions:
  id-token: write # required for OIDC login
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency: deploy-azure # never two deploys at once
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # --- Build the client + publish the .NET app (SPA goes into wwwroot first) ---
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/StuffInABox.Web/ClientApp/package-lock.json

      - name: Build SPA
        working-directory: src/StuffInABox.Web/ClientApp
        run: |
          npm ci
          npm run build

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish app
        # -r linux-x64 keeps only the Linux native assets (SkiaSharp/SQLite) instead of
        # every platform's — a ~30 MB artifact instead of ~490 MB.
        run: dotnet publish src/StuffInABox.Web -c Release -r linux-x64 --no-self-contained -o publish

      # --- Provision/Update infrastructure (subscription-scoped Bicep) ---
      # No secrets here — all secrets live in Key Vault and are referenced by the app at
      # runtime via its managed identity. Only non-secret config is passed (GitHub variables).
      - name: Deploy infrastructure (Bicep)
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az deployment sub create \
              --name "stuffinabox-${{ github.run_number }}" \
              --location "${{ vars.AZURE_LOCATION }}" \
              --template-file infra/main.bicep \
              --parameters \
                environmentName="${{ vars.AZURE_ENV }}" \
                location="${{ vars.AZURE_LOCATION }}" \
                appName="${{ vars.AZURE_APP_NAME }}" \
                appServiceSku="${{ vars.AZURE_APP_SKU }}" \
                databaseProvider="postgres" \
                keyVaultName="${{ vars.AZURE_KEY_VAULT }}" \
                brevoSmtpUser="${{ vars.SIB_BREVO_USER }}" \
                emailFrom="${{ vars.SIB_EMAIL_FROM }}" \
                googleClientId="${{ vars.SIB_GOOGLE_CLIENT_ID }}" \
                microsoftClientId="${{ vars.SIB_MICROSOFT_CLIENT_ID }}"

      # --- Deploy the app code to the Web App created above ---
      - name: Deploy app to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_APP_NAME }}
          package: publish
