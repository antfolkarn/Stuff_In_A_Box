name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore StuffInABox.slnx
      - name: Build
        run: dotnet build StuffInABox.slnx -c Release --no-restore
      - name: Test
        run: dotnet test StuffInABox.slnx -c Release --no-build --verbosity quiet

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/StuffInABox.Web/ClientApp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/StuffInABox.Web/ClientApp/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
